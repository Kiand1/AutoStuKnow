services:
  whisper:
    image: hwdsl2/whisper-server:cuda
    environment:
      WHISPER_DEVICE: cuda
      WHISPER_COMPUTE_TYPE: ${WHISPER_GPU_COMPUTE_TYPE:-float16}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
